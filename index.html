<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PDF Studio — Merge & Edit</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Mono:wght@400;500&family=Playfair+Display:ital,wght@0,700;1,400;1,700&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.2/Sortable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<script>
tailwind.config = {
  darkMode: ['selector', '[data-theme="dark"]'],
  theme: {
    extend: {
      fontFamily: {
        sans: ['DM Sans', 'sans-serif'],
        mono: ['DM Mono', 'monospace'],
        display: ['Playfair Display', 'serif'],
      },
      colors: {
        accent:  { DEFAULT: '#E8521A', hover: '#D4471A' },
        accent2: { DEFAULT: '#1A56E8' },
        surface: { DEFAULT: '#ffffff', dark: '#1C1B1A' },
        base:    { DEFAULT: '#F5F3EF', dark: '#111010' },
        card:    { DEFAULT: '#ffffff', dark: '#242322' },
        border:  { DEFAULT: '#E2DDD8', dark: '#2E2C2A' },
        tx:      { DEFAULT: '#1A1714', dark: '#F0EDE8' },
        mu:      { DEFAULT: '#7D756E', dark: '#847D76' },
      },
    }
  }
}
</script>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:'DM Sans',sans-serif;min-height:100vh}

  /* noise */
  body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:.45;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.04'/%3E%3C/svg%3E")}

  ::-webkit-scrollbar{width:5px;height:5px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:#d0ccc8;border-radius:99px}
  [data-theme="dark"] ::-webkit-scrollbar-thumb{background:#3a3836}

  /* card grid responsive */
  .card-grid{display:grid;gap:14px;grid-template-columns:repeat(auto-fill,minmax(158px,1fr))}
  @media(max-width:500px){.card-grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px}}

  /* drag states */
  .sortable-ghost{opacity:.2!important;background:#F5F3EF!important;border:2px dashed #E8521A!important}
  .sortable-fallback{opacity:.5!important;box-shadow:0 20px 40px rgba(0,0,0,.2)!important;cursor:grabbing!important;}
  .sortable-drag{opacity:.5!important;cursor:grabbing!important;}

  /* card hover reveals actions */
  .pdf-card:hover .card-actions{opacity:1;transform:translateY(0)}
  .pdf-card:hover .card-badge{opacity:1}

  /* drop overlay */
  #dropOverlay{pointer-events:none;opacity:0;transition:opacity .18s}
  #dropOverlay.active{opacity:1;pointer-events:all}

  /* dropdown */
  .ddmenu{transform-origin:top left;display:none}
  .ddmenu.open{display:block;animation:popIn .18s cubic-bezier(.34,1.56,.64,1) both}

  /* modal blur */
  .mbackdrop{backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px)}

  /* Playfair helpers */
  .pf-bold{font-family:'Playfair Display',serif;font-weight:700}
  .pf-italic{font-family:'Playfair Display',serif;font-style:italic;font-weight:400}

  /* spinner */
  @keyframes spin{to{transform:rotate(360deg)}}
  .spin{animation:spin .75s linear infinite}

  /* result screen */
  @keyframes resultSlideIn{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
  @keyframes scaleRing{from{transform:scale(0);opacity:0}to{transform:scale(1.4);opacity:0}}
  @keyframes drawCheck{to{stroke-dashoffset:0}}
  @keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(120vh) rotate(720deg);opacity:0}}
  .confetti-piece{position:fixed;top:-20px;pointer-events:none;z-index:9998;animation:confettiFall linear both}

  /* animations */
  @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  @keyframes cardIn{from{opacity:0;transform:scale(.94) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
  @keyframes popIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
  .anim-fade-up{animation:fadeUp .35s ease both}
  .anim-card-in{animation:cardIn .22s ease both}
  .anim-pop-in{animation:popIn .25s cubic-bezier(.34,1.56,.64,1) both}

  /* file input invisible */
  .finput{position:absolute;inset:0;opacity:0;cursor:pointer}
</style>
</head>
<body class="bg-[#F5F3EF] dark:bg-[#111010] text-[#1A1714] dark:text-[#F0EDE8] transition-colors duration-200">

<!-- ══════════ NAV ══════════ -->
<nav class="sticky top-0 z-50 h-[60px] bg-white dark:bg-[#1C1B1A] border-b border-[#E2DDD8] dark:border-[#2E2C2A] flex items-center gap-2 px-3 md:px-5 backdrop-blur-md transition-colors">

  <!-- Brand -->
  <div class="flex items-center gap-2 mr-2 flex-shrink-0">
    <div class="w-8 h-8 rounded-lg bg-[#E8521A] flex items-center justify-center">
      <svg class="w-4 h-4 fill-white" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm-1 7V3.5L18.5 9H13z"/></svg>
    </div>
    <span class="hidden sm:flex items-baseline">
      <span class="pf-bold text-[17px] tracking-tight">PDF</span>
      <span class="pf-italic text-[17px] text-[#E8521A] ml-1">Studio</span>
    </span>
  </div>

  <div class="w-px h-6 bg-[#E2DDD8] dark:bg-[#2E2C2A] hidden sm:block flex-shrink-0"></div>

  <!-- Add Files -->
  <label class="relative flex-shrink-0 flex items-center gap-1.5 px-2.5 py-1.5 rounded-lg border border-[#E2DDD8] dark:border-[#2E2C2A] text-[13px] font-medium cursor-pointer hover:bg-[#F5F3EF] dark:hover:bg-[#111010] transition-colors">
    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
    <span class="hidden sm:inline">Add Files</span>
    <input type="file" id="addFilesInput" accept=".pdf" multiple class="finput"/>
  </label>

  <!-- Add Folder -->
  <label class="relative flex-shrink-0 flex items-center gap-1.5 px-2.5 py-1.5 rounded-lg border border-[#E2DDD8] dark:border-[#2E2C2A] text-[13px] font-medium cursor-pointer hover:bg-[#F5F3EF] dark:hover:bg-[#111010] transition-colors">
    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
    <span class="hidden md:inline">Folder</span>
    <input type="file" id="addFolderInput" accept=".pdf" multiple webkitdirectory class="finput"/>
  </label>

  <div class="w-px h-6 bg-[#E2DDD8] dark:bg-[#2E2C2A] flex-shrink-0"></div>

  <!-- Tools dropdown -->
  <div class="relative flex-shrink-0" id="ddWrap">
    <button id="ddBtn" class="flex items-center gap-1.5 px-2.5 py-1.5 rounded-lg border border-[#E2DDD8] dark:border-[#2E2C2A] text-[13px] font-medium hover:bg-[#F5F3EF] dark:hover:bg-[#111010] transition-colors">
      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
      Tools
      <svg id="ddChev" class="w-3 h-3 transition-transform" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
    </button>
    <div id="ddMenu" class="ddmenu absolute top-full left-0 mt-2 w-56 bg-white dark:bg-[#1C1B1A] border border-[#E2DDD8] dark:border-[#2E2C2A] rounded-xl shadow-xl overflow-hidden z-50">
      <div class="px-3 py-1.5 text-[10px] font-semibold tracking-widest uppercase text-[#7D756E] dark:text-[#847D76] border-b border-[#E2DDD8] dark:border-[#2E2C2A]">Organize</div>
      <button class="ti w-full flex items-center gap-2.5 px-3.5 py-2.5 text-[13px] hover:bg-[#F5F3EF] dark:hover:bg-[#111010] transition-colors text-left" data-tool="merge">
        <svg class="w-4 h-4 text-[#E8521A] shrink-0" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M9 17H5a2 2 0 0 0-2 2v0a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v0a2 2 0 0 0-2-2h-4M12 3v12"/><polyline points="8 11 12 15 16 11"/></svg>
        Merge PDFs
      </button>
      <button class="ti w-full flex items-center gap-2.5 px-3.5 py-2.5 text-[13px] hover:bg-[#F5F3EF] dark:hover:bg-[#111010] transition-colors text-left" data-tool="split">
        <svg class="w-4 h-4 text-[#1A56E8] shrink-0" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M16 3h5v5M4 20 21 3M21 16v5h-5M15 15l6 6M4 4l5 5"/></svg>
        Split PDF
      </button>
      <button class="ti w-full flex items-center gap-2.5 px-3.5 py-2.5 text-[13px] hover:bg-[#F5F3EF] dark:hover:bg-[#111010] transition-colors text-left" data-tool="remove-pages">
        <svg class="w-4 h-4 text-orange-500 shrink-0" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6m5 0V4a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v2"/></svg>
        Remove Pages
      </button>
      <button class="ti w-full flex items-center gap-2.5 px-3.5 py-2.5 text-[13px] hover:bg-[#F5F3EF] dark:hover:bg-[#111010] transition-colors text-left" onclick="window.location.href='remove-pages.html'" >
        <svg class="w-4 h-4 text-orange-500 shrink-0" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6m5 0V4a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v2"/></svg>
        Remove Pages E-INV
      </button>
      <div class="px-3 py-1.5 text-[10px] font-semibold tracking-widest uppercase text-[#7D756E] dark:text-[#847D76] border-b border-t border-[#E2DDD8] dark:border-[#2E2C2A]">Edit</div>
      <button class="ti w-full flex items-center gap-2.5 px-3.5 py-2.5 text-[13px] hover:bg-[#F5F3EF] dark:hover:bg-[#111010] transition-colors text-left" data-tool="rotate-all">
        <svg class="w-4 h-4 text-violet-500 shrink-0" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.5"/></svg>
        Rotate All Pages
      </button>
      <button class="ti w-full flex items-center gap-2.5 px-3.5 py-2.5 text-[13px] hover:bg-[#F5F3EF] dark:hover:bg-[#111010] transition-colors text-left" data-tool="compress">
        <svg class="w-4 h-4 text-teal-500 shrink-0" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
        Compress PDF
      </button>
      <button class="ti w-full flex items-center gap-2.5 px-3.5 py-2.5 text-[13px] hover:bg-[#F5F3EF] dark:hover:bg-[#111010] transition-colors text-left" data-tool="watermark">
        <svg class="w-4 h-4 text-sky-500 shrink-0" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        Add Watermark
      </button>
      <div class="px-3 py-1.5 text-[10px] font-semibold tracking-widest uppercase text-[#7D756E] dark:text-[#847D76] border-b border-t border-[#E2DDD8] dark:border-[#2E2C2A]">Security</div>
      <button class="ti w-full flex items-center gap-2.5 px-3.5 py-2.5 text-[13px] hover:bg-[#F5F3EF] dark:hover:bg-[#111010] transition-colors text-left" data-tool="lock">
        <svg class="w-4 h-4 text-red-500 shrink-0" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        Lock PDF
      </button>
      <button class="ti w-full flex items-center gap-2.5 px-3.5 py-2.5 text-[13px] hover:bg-[#F5F3EF] dark:hover:bg-[#111010] transition-colors text-left" data-tool="unlock">
        <svg class="w-4 h-4 text-green-500 shrink-0" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg>
        Unlock PDF
      </button>
    </div>
  </div>

  <div class="w-px h-6 bg-[#E2DDD8] dark:bg-[#2E2C2A] flex-shrink-0"></div>

  <!-- Output name -->
  <div class="flex items-center gap-1.5 flex-1 min-w-0 max-w-[260px]">
    <span class="hidden lg:block text-[11px] font-medium text-[#7D756E] dark:text-[#847D76] whitespace-nowrap shrink-0">Output:</span>
    <input type="text" id="outputName" placeholder="merged.pdf" spellcheck="false"
      class="flex-1 min-w-0 bg-[#F5F3EF] dark:bg-[#111010] border border-[#E2DDD8] dark:border-[#2E2C2A] rounded-lg px-3 py-1.5 text-[12px] font-mono outline-none focus:border-[#E8521A] transition-colors"/>
  </div>

  <!-- Right -->
  <div class="ml-auto flex items-center gap-2 shrink-0">
    <button id="themeBtn" class="w-8 h-8 rounded-lg border border-[#E2DDD8] dark:border-[#2E2C2A] flex items-center justify-center hover:bg-[#F5F3EF] dark:hover:bg-[#111010] transition-colors text-[#7D756E] dark:text-[#847D76]">
      <svg id="sunIco" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      <svg id="moonIco" class="w-4 h-4 hidden" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <button id="mergeBtn" disabled class="flex items-center gap-1.5 px-3 py-1.5 bg-[#E8521A] hover:bg-[#D4471A] text-white text-[13px] font-medium rounded-lg disabled:opacity-40 disabled:cursor-not-allowed transition-all shadow-sm">
      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M9 17H5a2 2 0 0 0-2 2v0a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v0a2 2 0 0 0-2-2h-4M12 3v12"/><polyline points="8 11 12 15 16 11"/></svg>
      <span class="hidden sm:inline">Merge & Download</span>
      <span class="sm:hidden">Merge</span>
    </button>
  </div>
</nav>

<!-- ══════════ GLOBAL DROP OVERLAY ══════════ -->
<div id="dropOverlay" class="fixed inset-0 z-[200] flex flex-col items-center justify-center gap-4" style="background:rgba(232,82,26,.07);border:3px dashed #E8521A;">
  <div class="w-16 h-16 rounded-2xl bg-[#E8521A] flex items-center justify-center shadow-xl">
    <svg class="w-8 h-8 fill-white" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm-1 7V3.5L18.5 9H13z"/></svg>
  </div>
  <p class="pf-bold text-2xl text-[#E8521A]">Drop PDFs anywhere</p>
  <p class="text-sm text-[#7D756E]">Release to add files</p>
</div>

<!-- ══════════ EMPTY STATE ══════════ -->
<div id="emptyState" class="flex flex-col items-center justify-center min-h-[calc(100vh-60px)] gap-6 px-6 py-12 text-center anim-fade-up">
  <div class="w-20 h-20 rounded-[20px] flex items-center justify-center" style="background:linear-gradient(135deg,#E8521A,#F4982A);box-shadow:0 8px 32px rgba(232,82,26,.22)">
    <svg class="w-10 h-10 fill-white" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm-1 7V3.5L18.5 9H13z"/></svg>
  </div>
  <div>
    <h1 class="pf-bold text-[clamp(26px,4.5vw,44px)] tracking-tight leading-tight">
      Merge &amp; <span class="pf-italic text-[#E8521A]">Edit</span> PDFs
    </h1>
    <p class="mt-2 text-[15px] text-[#7D756E] dark:text-[#847D76] max-w-sm mx-auto leading-relaxed">Reorder, rotate, split, lock — all locally in your browser.</p>
  </div>
  <label class="relative w-full max-w-[420px] border-2 border-dashed border-[#E2DDD8] dark:border-[#2E2C2A] rounded-2xl px-8 py-10 flex flex-col items-center gap-3 cursor-pointer hover:border-[#E8521A] hover:bg-[#E8521A]/5 transition-all group">
    <input type="file" id="dropInput" accept=".pdf" multiple class="finput"/>
    <div class="w-12 h-12 rounded-xl bg-[#F5F3EF] dark:bg-[#111010] flex items-center justify-center text-2xl group-hover:bg-[#E8521A]/10 transition-colors">⊕</div>
    <strong class="text-[15px] font-medium">Drop PDFs here</strong>
    <span class="text-sm text-[#7D756E] dark:text-[#847D76]">or click to browse · drop anywhere on screen</span>
  </label>
</div>

<!-- ══════════ WORKSPACE ══════════ -->
<div id="workspace" class="hidden px-3 md:px-5 pt-5 pb-24 max-w-[1440px] mx-auto anim-fade-up">
  <div class="flex items-center justify-between mb-4 gap-3 flex-wrap">
    <p id="fileCount" class="text-[13px] text-[#7D756E] dark:text-[#847D76] font-medium"></p>
    <button id="clearAllBtn" class="text-[12px] px-3 py-1.5 rounded-lg border border-[#E2DDD8] dark:border-[#2E2C2A] text-[#7D756E] dark:text-[#847D76] hover:bg-[#F5F3EF] dark:hover:bg-[#111010] hover:text-[#1A1714] dark:hover:text-[#F0EDE8] transition-colors">Clear all</button>
  </div>
  <div id="cardGrid" class="card-grid"></div>
</div>

<!-- ══════════ MERGE RESULT SCREEN ══════════ -->
<div id="mergeResult" class="hidden fixed inset-0 z-[350] flex flex-col overflow-hidden" style="background:#0f0f0f">

  <!-- ── Navbar ── -->
  <div class="shrink-0 flex items-center justify-between px-4 md:px-7 h-[56px] border-b" style="background:#171717;border-color:#2a2a2a">
    <div class="flex items-center gap-2.5">
      <div class="w-7 h-7 rounded-lg bg-[#E8521A] flex items-center justify-center shrink-0">
        <svg class="w-3.5 h-3.5 fill-white" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm-1 7V3.5L18.5 9H13z"/></svg>
      </div>
      <span class="pf-bold text-[15px] tracking-tight text-white hidden sm:block">PDF <span class="pf-italic text-[#E8521A]">Studio</span></span>
    </div>
    <!-- desktop nav actions -->
    <div class="hidden md:flex items-center gap-2">
      <button id="mrEditBtn" class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-[12px] font-medium transition-all text-gray-300 hover:text-white hover:bg-white/10" style="border:1px solid #333">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        Edit PDF
      </button>
      <button id="mrNewBtn" class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-[12px] font-medium transition-all text-gray-300 hover:text-white hover:bg-white/10" style="border:1px solid #333">

</div>

<script>
// ── Setup ────────────────────────────────────────────────────────────────
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const STORAGE_KEY = 'pdfstudio_v4';
const EXPIRE_MS   = 36 * 60 * 60 * 1000;

let files      = [];   // { id, name, size, rotation, data:Uint8Array }
let nextId     = 1;
let nameEdited = false;
let sortable   = null;

// DOM refs
const emptyState  = document.getElementById('emptyState');
const workspace   = document.getElementById('workspace');
const cardGrid    = document.getElementById('cardGrid');
const mergeBtn    = document.getElementById('mergeBtn');
const outputName  = document.getElementById('outputName');
const fileCountEl = document.getElementById('fileCount');
const progressOv  = document.getElementById('progressOv');
const progBar     = document.getElementById('progBar');
const progLabel   = document.getElementById('progLabel');
const progTitle   = document.getElementById('progTitle');
const toast       = document.getElementById('toast');
const toastDot    = document.getElementById('toastDot');
const toastMsg    = document.getElementById('toastMsg');
const dropOverlay = document.getElementById('dropOverlay');

// ── Theme ─────────────────────────────────────────────────────────────────
const themeBtn = document.getElementById('themeBtn');
const sunIco   = document.getElementById('sunIco');
const moonIco  = document.getElementById('moonIco');

function setTheme(dark) {
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  sunIco.classList.toggle('hidden', dark);
  moonIco.classList.toggle('hidden', !dark);
  localStorage.setItem('pdfstudio_theme', dark ? 'dark' : 'light');
}
function initTheme() {
  const saved = localStorage.getItem('pdfstudio_theme');
  const sys   = window.matchMedia('(prefers-color-scheme:dark)').matches;
  setTheme(saved ? saved === 'dark' : sys);
}
themeBtn.addEventListener('click', () => setTheme(document.documentElement.getAttribute('data-theme') !== 'dark'));
initTheme();

// ── Toast ──────────────────────────────────────────────────────────────────
let toastT = null;
function showToast(msg, type = 'info', dur = 3200) {
  toastMsg.textContent = msg;
  toastDot.style.background = type === 'success' ? '#4CAF50' : type === 'error' ? '#E8521A' : '#1A56E8';
  toast.classList.remove('opacity-0','translate-y-3','pointer-events-none');
  toast.classList.add('opacity-100','translate-y-0');
  clearTimeout(toastT);
  toastT = setTimeout(() => {
    toast.classList.add('opacity-0','translate-y-3','pointer-events-none');
    toast.classList.remove('opacity-100','translate-y-0');
  }, dur);
}

// ── Progress ───────────────────────────────────────────────────────────────
function showProg(title, label) {
  progTitle.textContent = title; progLabel.textContent = label; progBar.style.width = '0%';
  progressOv.classList.remove('hidden'); progressOv.classList.add('flex');
}
function setProg(pct, label) {
  progBar.style.width = pct + '%'; if (label) progLabel.textContent = label;
}
function hideProg() { progressOv.classList.add('hidden'); progressOv.classList.remove('flex'); }

// ── Output name ────────────────────────────────────────────────────────────
outputName.addEventListener('input', () => nameEdited = true);
function suggestName(name) {
  if (nameEdited) return;
  outputName.value = name.replace(/\.pdf$/i, '') + '-merged.pdf';
}

// ── Extract PDF Text ───────────────────────────────────────────────────────
async function extractPdfText(data) {
  try {
    const pdf = await pdfjsLib.getDocument({ data: data.slice() }).promise;
    let fullText = '';
    for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const textContent = await page.getTextContent();
        fullText += textContent.items.map(s => s.str).join(' ') + ' ';
    }
    return fullText.toLowerCase();
  } catch (e) { return ''; }
}

// ── Add files — stores binary data ─────────────────────────────────────────
async function addFiles(fileList) {
  const pdfs = [...fileList].filter(f => f.name.toLowerCase().endsWith('.pdf'));
  if (!pdfs.length) { showToast('No PDF files found', 'error'); return; }

  const names = new Set(files.map(f => f.name));
  const fresh = [], skipped = [];
  for (const f of pdfs) {
    if (names.has(f.name)) skipped.push(f.name);
    else { fresh.push(f); names.add(f.name); }
  }
  if (skipped.length) showToast(`Skipped ${skipped.length} duplicate${skipped.length > 1 ? 's' : ''}`, 'info');
  if (!fresh.length) return;

  if (!files.length) suggestName(fresh[0].name);

  for (const f of fresh) {
    const data  = new Uint8Array(await f.arrayBuffer());
    const entry = { id: nextId++, name: f.name, size: f.size, rotation: 0, data, textContent: '' };
    files.push(entry);
    const card = createCard(entry);
    cardGrid.insertBefore(card, cardGrid.querySelector('.add-card'));
    renderThumb(entry, card);
    extractPdfText(data).then(t => { 
        entry.textContent = t;
        if (typeof performSearch === 'function' && !document.getElementById('searchBar').classList.contains('hidden')) {
            performSearch(document.getElementById('searchInput').value);
        }
    }).catch(e => console.error('Text extract error:', e));
  }
  updateUI(); saveState();
  showToast(`${fresh.length} file${fresh.length > 1 ? 's' : ''} added`, 'success');
}

// ── Create card ────────────────────────────────────────────────────────────
function mkBtn(cls, title, iconSvg) {
  const b = document.createElement('button');
  b.className = cls; b.title = title; b.innerHTML = iconSvg;
  return b;
}

function createCard(entry) {
  const card = document.createElement('div');
  card.className = 'pdf-card relative bg-white dark:bg-[#242322] border border-[#E2DDD8] dark:border-[#2E2C2A] rounded-xl overflow-hidden cursor-grab anim-card-in select-none transition-all duration-150 hover:-translate-y-0.5 hover:shadow-xl hover:border-transparent group';
  card.dataset.id = entry.id;

  // Preview area
  const prev = document.createElement('div');
  prev.className = 'card-preview relative w-full bg-[#F5F3EF] dark:bg-[#111010] flex items-center justify-center overflow-hidden';
  prev.style.aspectRatio = '3/4';
  prev.innerHTML = `<div class="flex flex-col items-center gap-1.5 text-[#7D756E] dark:text-[#847D76]"><div class="w-5 h-5 border-2 border-[#E2DDD8] border-t-[#E8521A] rounded-full spin"></div><span class="text-[10px]">Loading…</span></div>`;

  // Badge
  const badge = document.createElement('div');
  badge.className = 'card-badge absolute top-2 left-2 bg-black/55 text-white text-[10px] font-mono px-1.5 py-px rounded opacity-0 transition-opacity backdrop-blur-sm';
  badge.innerHTML = '#<span class="card-num"></span>';

  // Actions row
  const acts = document.createElement('div');
  acts.className = 'card-actions absolute top-2 right-2 flex gap-1 opacity-0 -translate-y-1 transition-all duration-150';

  const btnBase = 'w-6 h-6 rounded-md flex items-center justify-center backdrop-blur-sm transition-colors';
  const btnBg   = 'rgba(255,255,255,0.92)';

  const eyeBtn = mkBtn(`${btnBase} text-[#1A56E8] hover:bg-[#1A56E8] hover:text-white`, 'Preview',
    `<svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`);
  const cpyBtn = mkBtn(`${btnBase} text-[#22a06b] hover:bg-[#22a06b] hover:text-white`, 'Duplicate',
    `<svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`);
  const rotBtn = mkBtn(`${btnBase} text-[#1A1714] dark:text-[#F0EDE8] hover:bg-[#1A1714] dark:hover:bg-[#F0EDE8] hover:text-white dark:hover:text-[#1A1714]`, 'Rotate 90°',
    `<svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.5"/></svg>`);
  const delBtn = mkBtn(`${btnBase} text-[#E8521A] hover:bg-[#E8521A] hover:text-white`, 'Remove',
    `<svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`);

  [eyeBtn, cpyBtn, rotBtn, delBtn].forEach(b => { b.style.background = btnBg; acts.appendChild(b); });

  eyeBtn.addEventListener('click', e => { e.stopPropagation(); openPreview(entry); });
  cpyBtn.addEventListener('click', e => { e.stopPropagation(); duplicateFile(entry.id); });
  rotBtn.addEventListener('click', e => { e.stopPropagation(); rotateCard(entry.id, card); });
  delBtn.addEventListener('click', e => { e.stopPropagation(); removeCard(entry.id, card); });

  // Info
  const info = document.createElement('div');
  info.className = 'px-2.5 py-2 border-t border-[#E2DDD8] dark:border-[#2E2C2A] bg-white dark:bg-[#242322] relative rounded-b-xl z-20';
  info.innerHTML = `
    <div class="text-[11px] font-medium leading-snug card-name" style="word-break:break-word;overflow-wrap:anywhere">${escHtml(entry.name)}</div>
    <div class="flex items-center gap-1.5 mt-0.5">
      <span class="text-[10px] text-[#7D756E] dark:text-[#847D76]">${fmtSize(entry.size)}</span>
      <span class="rot-badge hidden items-center gap-0.5 text-[10px] font-mono text-[#E8521A] bg-[#F5F3EF] dark:bg-[#111010] border border-[#E2DDD8] dark:border-[#2E2C2A] rounded px-1">
        <svg class="w-2 h-2" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.5"/></svg>
        <span class="rot-lbl">0°</span>
      </span>
    </div>`;

  card.append(prev, badge, acts, info);

  // Update button bg on theme change
  const themeObs = new MutationObserver(() => {
    const dark = document.documentElement.getAttribute('data-theme') === 'dark';
    [eyeBtn, cpyBtn, rotBtn, delBtn].forEach(b => b.style.background = dark ? 'rgba(36,35,34,0.92)' : 'rgba(255,255,255,0.92)');
  });
  themeObs.observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });
  // Set immediately
  if (document.documentElement.getAttribute('data-theme') === 'dark') {
    [eyeBtn, cpyBtn, rotBtn, delBtn].forEach(b => b.style.background = 'rgba(36,35,34,0.92)');
  }

  return card;
}

// ── Render thumbnail ───────────────────────────────────────────────────────
async function renderThumb(entry, card) {
  if (!entry.data) return;
  try {
    const pdf   = await pdfjsLib.getDocument({ data: entry.data.slice() }).promise;
    const page  = await pdf.getPage(1);
    const vp    = page.getViewport({ scale: 1 });
    const scale = 220 / Math.max(vp.width, vp.height);
    const vport = page.getViewport({ scale });
    const canvas = document.createElement('canvas');
    canvas.width = vport.width; canvas.height = vport.height;
    canvas.style.cssText = 'width:100%!important;height:100%!important;object-fit:contain;';
    canvas.style.transform = `rotate(${entry.rotation}deg)`;
    await page.render({ canvasContext: canvas.getContext('2d'), viewport: vport }).promise;
    const pv = card.querySelector('.card-preview');
    pv.innerHTML = ''; pv.appendChild(canvas);
  } catch {
    card.querySelector('.card-preview').innerHTML = `<div class="text-3xl opacity-20">📄</div>`;
  }
}

// ── Rotate card ────────────────────────────────────────────────────────────
function rotateCard(id, card) {
  const e = files.find(f => f.id === id); if (!e) return;
  e.rotation = (e.rotation + 90) % 360;
  const cv = card.querySelector('canvas');
  if (cv) cv.style.transform = `rotate(${e.rotation}deg)`;
  const rb  = card.querySelector('.rot-badge');
  const rl  = card.querySelector('.rot-lbl');
  if (e.rotation === 0) { rb.classList.add('hidden'); rb.classList.remove('inline-flex'); }
  else { rb.classList.remove('hidden'); rb.classList.add('inline-flex'); rl.textContent = e.rotation + '°'; }
  saveState();
}

// ── Remove card ────────────────────────────────────────────────────────────
function removeCard(id, card) {
  files = files.filter(f => f.id !== id);
  Object.assign(card.style, { transition: 'opacity .18s, transform .18s', opacity: '0', transform: 'scale(.88)' });
  setTimeout(() => card.remove(), 180);
  updateUI(); saveState();
}

// ── Duplicate ──────────────────────────────────────────────────────────────
function duplicateFile(id) {
  const src = files.find(f => f.id === id);
  if (!src?.data) { showToast('No file data to duplicate', 'error'); return; }
  const base  = src.name.replace(/\.pdf$/i, '').replace(/\s+copy(\s+\d+)?$/i, '');
  const count = files.filter(f => f.name.match(new RegExp(`^${escRx(base)}(\\s+copy(\\s+\\d+)?)?\\.pdf$`, 'i'))).length;
  const name  = count <= 1 ? `${base} copy.pdf` : `${base} copy ${count}.pdf`;
  const entry = { id: nextId++, name, size: src.data.byteLength, rotation: src.rotation, data: src.data.slice(), textContent: src.textContent || '' };
  files.push(entry);
  const card = createCard(entry);
  const src$ = cardGrid.querySelector(`[data-id="${id}"]`);
  cardGrid.insertBefore(card, src$?.nextSibling || cardGrid.querySelector('.add-card'));
  renderThumb(entry, card);
  updateUI(); saveState();
  showToast(`Duplicated as "${name}"`, 'success');
}

// ── Update UI ──────────────────────────────────────────────────────────────
function updateUI() {
  const has = files.length > 0;
  emptyState.classList.toggle('hidden', has);
  emptyState.classList.toggle('flex', !has);
  workspace.classList.toggle('hidden', !has);
  mergeBtn.disabled = !has;
  const n = files.length;
  fileCountEl.innerHTML = `<span class="pf-italic text-[15px] text-[#1A1714] dark:text-[#F0EDE8]">${n}</span>&nbsp;file${n !== 1 ? 's' : ''} — drag to reorder`;
  cardGrid.querySelectorAll('.pdf-card').forEach((c, i) => {
    const num = c.querySelector('.card-num'); if (num) num.textContent = i + 1;
  });
  if (has && !sortable) initSortable();
}

// ── Sortable ───────────────────────────────────────────────────────────────
function initSortable() {
  sortable = Sortable.create(cardGrid, {
    animation: 350,
    easing: "cubic-bezier(0.2, 1, 0.1, 1)",
    ghostClass: 'sortable-ghost', dragClass: 'sortable-drag',
    forceFallback: true, fallbackClass: 'sortable-fallback', fallbackTolerance: 3,
    handle: '.card-preview', filter: '.add-card',
    onStart: () => { 
        document.body.style.cursor = 'grabbing';
        cardGrid.classList.add('is-dragging');
    },
    onEnd:   () => { 
        document.body.style.cursor = ''; 
        cardGrid.classList.remove('is-dragging');
        syncOrder(); saveState(); 
    }
  });
}
function syncOrder() {
  const next = [];
  cardGrid.querySelectorAll('.pdf-card').forEach(c => { const e = files.find(f => f.id === +c.dataset.id); if (e) next.push(e); });
  files = next; updateUI();
}

// ── Add card ───────────────────────────────────────────────────────────────
function appendAddCard() {
  if (cardGrid.querySelector('.add-card')) return;
  const el = document.createElement('label');
  el.className = 'add-card relative border-2 border-dashed border-[#E2DDD8] dark:border-[#2E2C2A] rounded-xl flex flex-col items-center justify-center gap-2 cursor-pointer hover:border-[#E8521A] hover:bg-[#E8521A]/5 transition-all text-[#7D756E] dark:text-[#847D76] min-h-[160px]';
  el.innerHTML = `<input type="file" accept=".pdf" multiple class="finput"/><div class="w-10 h-10 rounded-xl bg-[#F5F3EF] dark:bg-[#111010] flex items-center justify-center text-xl font-light">+</div><span class="text-xs font-medium">Add PDF</span>`;
  el.querySelector('input').addEventListener('change', e => { addFiles(e.target.files); e.target.value = ''; });
  cardGrid.appendChild(el);
}

// ── Ordered files ──────────────────────────────────────────────────────────
function orderedFiles() {
  return [...cardGrid.querySelectorAll('.pdf-card')].map(c => files.find(f => f.id === +c.dataset.id)).filter(Boolean);
}

// ── Merge result state ────────────────────────────────────────────────────
let mergedBytes    = null;   // Uint8Array of the merged PDF
let preEditFiles   = null;   // snapshot of files[] before merge (for "Edit this PDF")
let preEditName    = '';

// ── Merge ──────────────────────────────────────────────────────────────────
mergeBtn.addEventListener('click', async () => {
  if (!files.length) return;
  const list = orderedFiles();
  showProg('Merging PDFs…', 'Initialising');
  try {
    const { PDFDocument, degrees } = PDFLib;
    const out = await PDFDocument.create();
    for (let i = 0; i < list.length; i++) {
      const e = list[i];
      setProg(Math.round((i / list.length) * 88), `Adding: ${e.name}`);
      const src   = await PDFDocument.load(e.data.slice(), { ignoreEncryption: true });
      const pages = await out.copyPages(src, src.getPageIndices());
      pages.forEach(p => { if (e.rotation) p.setRotation(degrees(p.getRotation().angle + e.rotation)); out.addPage(p); });
    }
    setProg(96, 'Finalising…');
    const bytes = await out.save();
    setProg(100, 'Done!'); await sleep(300); hideProg();

    // Store merged result and pre-edit snapshot
    mergedBytes  = bytes;
    preEditFiles = files.map(f => ({ ...f, data: f.data?.slice() }));
    preEditName  = outputName.value || 'merged.pdf';

    const totalPages = out.getPageCount();
    const totalSize  = bytes.byteLength;

    // ✅ Auto-download immediately on merge
    dl(mergedBytes, preEditName.endsWith('.pdf') ? preEditName : preEditName + '.pdf', 'application/pdf');

    openMergeResult(preEditName, totalPages, totalSize, list.length);
  } catch (err) { hideProg(); showToast('Merge failed — ' + err.message, 'error'); }
});

// ── Open merge result screen ───────────────────────────────────────────────
async function openMergeResult(filename, pages, size, fileCount) {
  const screen = document.getElementById('mergeResult');

  // Set filename input
  document.getElementById('mrFileName').value = filename;

  // Stats line
  document.getElementById('mrStats').textContent =
    `${fileCount} file${fileCount !== 1 ? 's' : ''} · ${pages} page${pages !== 1 ? 's' : ''} · ${fmtSize(size)}`;

  // Show screen
  screen.style.animation = 'none';
  screen.classList.remove('hidden');
  requestAnimationFrame(() => {
    screen.style.animation = 'resultSlideIn .4s cubic-bezier(.22,1,.36,1) both';
  });
  document.body.style.overflow = 'hidden';

  // Confetti 🎉
  spawnConfetti();

  // Render preview
  renderMergedPreview();
}

function closeMergeResult() {
  const screen = document.getElementById('mergeResult');
  screen.classList.add('hidden');
  document.body.style.overflow = '';
  document.getElementById('mrPreviewBody').innerHTML = '';
}

// ── Render merged preview ──────────────────────────────────────────────────
async function renderMergedPreview() {
  if (!mergedBytes) return;
  const body = document.getElementById('mrPreviewBody');
  body.innerHTML = `<div class="flex flex-col items-center gap-3 py-16 text-[#7D756E]"><div class="w-8 h-8 border-2 border-[#E2DDD8] border-t-[#E8521A] rounded-full spin"></div><span class="text-sm">Rendering preview…</span></div>`;

  try {
    const pdf   = await pdfjsLib.getDocument({ data: mergedBytes.slice() }).promise;
    const total = pdf.numPages;
    body.innerHTML = '';

    for (let i = 1; i <= total; i++) {
      const wrap = document.createElement('div');
      wrap.className = 'relative w-full rounded-xl overflow-hidden';
      wrap.style.cssText = 'background:#1e1e1e;border:1px solid #2d2d2d;box-shadow:0 4px 24px rgba(0,0,0,.4)';
      const canvas = document.createElement('canvas');
      canvas.style.cssText = 'width:100%;display:block';
      const lbl = document.createElement('div');
      lbl.className = 'absolute bottom-2 right-2 text-[10px] font-mono bg-black/35 text-white px-1.5 py-0.5 rounded-md backdrop-blur-sm';
      lbl.textContent = `${i} / ${total}`;
      wrap.append(canvas, lbl);
      body.appendChild(wrap);

      const pn = i;
      (async () => {
        try {
          const page  = await pdf.getPage(pn);
          const vp    = page.getViewport({ scale: 1 });
          const dpr   = window.devicePixelRatio || 1;
          const fit   = Math.min(680, window.innerWidth - 40);
          const scale = (fit * dpr) / vp.width;
          const vport = page.getViewport({ scale });
          canvas.width  = vport.width;
          canvas.height = vport.height;
          canvas.style.width  = (vport.width  / dpr) + 'px';
          canvas.style.height = (vport.height / dpr) + 'px';
          await page.render({ canvasContext: canvas.getContext('2d'), viewport: vport }).promise;
        } catch {}
      })();
    }
  } catch {
    body.innerHTML = `<p class="text-[#E8521A] text-sm py-10 text-center">Could not render preview</p>`;
  }
}

// ── Confetti ───────────────────────────────────────────────────────────────
function spawnConfetti() {
  const colors = ['#E8521A','#F4982A','#1A56E8','#22c55e','#a855f7','#ec4899','#eab308'];
  for (let i = 0; i < 64; i++) {
    const el = document.createElement('div');
    const size = 6 + Math.random() * 8;
    el.className = 'confetti-piece';
    el.style.cssText = `
      left:${Math.random()*100}%;
      width:${size}px; height:${size}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      border-radius:${Math.random() > .5 ? '50%' : '2px'};
      animation-duration:${1.8 + Math.random()*1.8}s;
      animation-delay:${Math.random()*0.6}s;
    `;
    document.body.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
  }
}

// ── Result screen button wiring ───────────────────────────────────────────
function wireMergeResultBtns() {
  function doDownload() {
    if (!mergedBytes) return;
    const name = document.getElementById('mrFileName').value || 'merged.pdf';
    dl(mergedBytes, name.endsWith('.pdf') ? name : name + '.pdf', 'application/pdf');
    showToast('Downloaded!', 'success');
  }

  function doEdit() {
    if (!preEditFiles) return;
    closeMergeResult();
    files   = preEditFiles.map(f => ({ ...f, data: f.data?.slice() }));
    nextId  = Math.max(...files.map(f => f.id)) + 1;
    outputName.value = preEditName; nameEdited = false;
    cardGrid.innerHTML = '';
    files.forEach(entry => { const card = createCard(entry); cardGrid.appendChild(card); renderThumb(entry, card); });
    appendAddCard(); updateUI();
    showToast('Restored pre-merge state', 'success');
  }

  function doNew() {
    closeMergeResult();
    files = []; nextId = 1; nameEdited = false; mergedBytes = null; sortable = null;
    cardGrid.innerHTML = ''; appendAddCard();
    outputName.value = ''; updateUI();
    localStorage.removeItem(STORAGE_KEY);
    showToast('Ready to merge new files', 'info');
  }

  function doShare() {
    const url = window.location.href.split('?')[0];
    if (navigator.share) {
      navigator.share({ title: 'PDF Studio', text: 'Free browser-based PDF merge & edit tool', url }).catch(() => {});
    } else {
      navigator.clipboard.writeText(url).then(() => showToast('Tool URL copied!', 'success')).catch(() => showToast('Copy failed', 'error'));
    }
  }

  async function doNativeShare() {
    if (!mergedBytes) return;
    const name  = document.getElementById('mrFileName').value || 'merged.pdf';
    const fname = name.endsWith('.pdf') ? name : name + '.pdf';
    if (navigator.share && navigator.canShare) {
      try {
        const file = new File([mergedBytes], fname, { type: 'application/pdf' });
        if (navigator.canShare({ files: [file] })) { await navigator.share({ files: [file], title: fname }); return; }
      } catch {}
    }
    doDownload();
  }

  function doSplitAfter() {
    if (!mergedBytes) return;
    const name  = document.getElementById('mrFileName').value || 'merged.pdf';
    const entry = { id: nextId++, name, size: mergedBytes.byteLength, rotation: 0, data: mergedBytes.slice() };
    files.push(entry);
    closeMergeResult();
    cardGrid.innerHTML = '';
    files.forEach(en => { const c = createCard(en); cardGrid.appendChild(c); renderThumb(en, c); });
    appendAddCard(); updateUI(); doTool('split');
  }

  // Wire every button — desktop navbar
  const bind = (id, fn) => { const el = document.getElementById(id); if (el) el.addEventListener('click', fn); };

  bind('mrDownBtn',        doDownload);
  bind('mrEditBtn',        doEdit);
  bind('mrNewBtn',         doNew);
  bind('mrShareBtn',       doShare);

  // Mobile drawer
  bind('mrDownBtnM',       doDownload);
  bind('mrEditBtnM',       doEdit);
  bind('mrNewBtnM',        doNew);
  bind('mrShareBtnM',      doShare);
  bind('mrMobileMenuBtn',  () => document.getElementById('mrMobileMenu').classList.toggle('hidden'));

  // Hero area big buttons
  bind('mrDownBtn2',       doDownload);
  bind('mrEditBtn2',       doEdit);
  bind('mrNewBtn2',        doNew);
  bind('mrNativeShareBtn', doNativeShare);
  bind('mrSplitAfterBtn',  doSplitAfter);

  // Filename save button + Enter key
  bind('mrRenameDownBtn',  doDownload);
  document.getElementById('mrFileName')?.addEventListener('keydown', e => { if (e.key === 'Enter') doDownload(); });

  // Copy link
  bind('mrCopyUrlBtn', () => {
    navigator.clipboard.writeText(window.location.href.split('?')[0])
      .then(() => showToast('Tool link copied!', 'success'))
      .catch(() => showToast('Copy failed', 'error'));
  });
}

// Wire once on load
wireMergeResultBtns();


// ── Preview modal ──────────────────────────────────────────────────────────
const prevModal = document.getElementById('prevModal');
const prevBody  = document.getElementById('prevBody');
const prevTitle = document.getElementById('prevTitle');
const prevInfo  = document.getElementById('prevInfo');
const prevClose = document.getElementById('prevClose');

async function openPreview(entry) {
  if (!entry.data) { showToast('No file data available', 'error'); return; }
  prevTitle.textContent = entry.name; prevInfo.textContent = '';
  prevBody.innerHTML = `<div class="flex flex-col items-center gap-3 py-12 text-[#7D756E]"><div class="w-8 h-8 border-2 border-[#E2DDD8] border-t-[#E8521A] rounded-full spin"></div><span class="text-sm">Rendering…</span></div>`;
  prevModal.classList.remove('hidden'); prevModal.classList.add('flex');
  document.body.style.overflow = 'hidden';
  try {
    const pdf   = await pdfjsLib.getDocument({ data: entry.data.slice() }).promise;
    const total = pdf.numPages;
    prevInfo.textContent = `${total} page${total !== 1 ? 's' : ''}`;
    prevBody.innerHTML = '';
    for (let i = 1; i <= total; i++) {
      const wrap   = document.createElement('div');
      wrap.className = 'relative w-full max-w-[640px] bg-white dark:bg-[#1C1B1A] rounded-lg shadow-md overflow-hidden';
      const canvas = document.createElement('canvas');
      canvas.style.cssText = 'width:100%;display:block';
      const lbl = document.createElement('div');
      lbl.className = 'absolute bottom-2 right-2 text-[10px] font-mono bg-black/30 text-white px-1.5 py-0.5 rounded backdrop-blur-sm';
      lbl.textContent = `${i} / ${total}`;
      wrap.append(canvas, lbl);
      prevBody.appendChild(wrap);
      const pn = i;
      (async () => {
        try {
          const page  = await pdf.getPage(pn);
          const vp    = page.getViewport({ scale: 1 });
          const dpr   = window.devicePixelRatio || 1;
          const fit   = (Math.min(620, window.innerWidth - 64));
          const scale = (fit * dpr) / vp.width;
          const vport = page.getViewport({ scale, rotation: entry.rotation });
          canvas.width  = vport.width;
          canvas.height = vport.height;
          canvas.style.width  = (vport.width  / dpr) + 'px';
          canvas.style.height = (vport.height / dpr) + 'px';
          await page.render({ canvasContext: canvas.getContext('2d'), viewport: vport }).promise;
        } catch {}
      })();
    }
  } catch { prevBody.innerHTML = `<p class="text-sm text-[#E8521A] py-10 text-center">Failed to load PDF</p>`; }
}
function closePreview() {
  prevModal.classList.add('hidden'); prevModal.classList.remove('flex');
  document.body.style.overflow = ''; prevBody.innerHTML = '';
}
prevClose.addEventListener('click', closePreview);
prevModal.addEventListener('click', e => { if (e.target === prevModal) closePreview(); });

const ddBtn  = document.getElementById('ddBtn');
const ddMenu = document.getElementById('ddMenu');

// ── Tool modal ─────────────────────────────────────────────────────────────
const toolModal = document.getElementById('toolModal');
const tmTitle   = document.getElementById('tmTitle');
const tmIcon    = document.getElementById('tmIcon');
const tmBody    = document.getElementById('tmBody');
const tmClose   = document.getElementById('tmClose');
const tmCancel  = document.getElementById('tmCancel');
const tmApply   = document.getElementById('tmApply');
let activeTool  = null;

function openTool(title, icon, html, fn) {
  tmTitle.textContent = title; tmIcon.textContent = icon; tmBody.innerHTML = html; activeTool = fn;
  toolModal.classList.remove('hidden'); toolModal.classList.add('flex');
  document.body.style.overflow = 'hidden';
}
function closeTool() {
  toolModal.classList.add('hidden'); toolModal.classList.remove('flex');
  document.body.style.overflow = ''; activeTool = null;
}
tmClose.addEventListener('click', closeTool); tmCancel.addEventListener('click', closeTool);

tmApply.addEventListener('click', async () => { if (activeTool) await activeTool(); });

function needFile() { if (!files.length) { showToast('Add a PDF first', 'error'); return false; } return true; }

// File select HTML helper
function fileSelHTML(id) { return `<div><label class="block text-[12px] font-medium text-[#7D756E] dark:text-[#847D76] mb-1.5">Select PDF</label><select id="${id}" class="w-full bg-[#F5F3EF] dark:bg-[#111010] border border-[#E2DDD8] dark:border-[#2E2C2A] rounded-lg px-3 py-2 text-[13px] outline-none">${files.map(f=>`<option value="${f.id}">${escHtml(f.name)}</option>`).join('')}</select></div>`; }

// Input field HTML helper
function inputHTML(id, label, type, placeholder, value = '') {
  return `<div><label class="block text-[12px] font-medium text-[#7D756E] dark:text-[#847D76] mb-1.5">${label}</label><input id="${id}" type="${type}" placeholder="${escHtml(placeholder)}" value="${escHtml(value)}" class="w-full bg-[#F5F3EF] dark:bg-[#111010] border border-[#E2DDD8] dark:border-[#2E2C2A] rounded-lg px-3 py-2 text-[13px] outline-none focus:border-[#E8521A] transition-colors"/></div>`;
}

// Tools
document.querySelectorAll('.ti').forEach(btn => {
  btn.addEventListener('click', () => { ddMenu.classList.remove('open'); ddMenu.classList.add('hidden'); ddChev.style.transform = ''; doTool(btn.dataset.tool); });
});

function doTool(tool) {
  switch (tool) {
    case 'merge': mergeBtn.click(); break;

    case 'split':
      if (!needFile()) return;
      openTool('Split PDF', '✂️', `<div class="flex flex-col gap-4">${fileSelHTML('sp-file')}<div><label class="block text-[12px] font-medium text-[#7D756E] dark:text-[#847D76] mb-2">Split method</label><div class="flex flex-col gap-2 text-[13px]"><label class="flex items-center gap-2 cursor-pointer"><input type="radio" name="spMode" value="every" checked class="accent-[#E8521A]"/>Every page (one file per page)</label><label class="flex items-center gap-2 cursor-pointer"><input type="radio" name="spMode" value="range" class="accent-[#E8521A]"/>Custom range<input id="spRange" type="text" placeholder="e.g. 1-3, 5, 7-9" class="ml-2 flex-1 bg-[#F5F3EF] dark:bg-[#111010] border border-[#E2DDD8] dark:border-[#2E2C2A] rounded-lg px-2 py-1 text-[12px] font-mono outline-none"/></label></div></div></div>`,
      async () => {
        const id   = +document.getElementById('sp-file').value;
        const mode = document.querySelector('input[name="spMode"]:checked').value;
        const e    = files.find(f => f.id === id); if (!e) return;
        closeTool(); showProg('Splitting…', 'Loading');
        try {
          const { PDFDocument } = PDFLib;
          const src   = await PDFDocument.load(e.data.slice(), { ignoreEncryption: true });
          const total = src.getPageCount();
          let ranges  = [];
          if (mode === 'every') { for (let i = 0; i < total; i++) ranges.push([i]); }
          else {
            document.getElementById('spRange').value.split(',').forEach(r => {
              r = r.trim();
              const m = r.match(/^(\d+)-(\d+)$/);
              if (m) { const a=[]; for (let i=+m[1]-1;i<+m[2];i++) a.push(i); ranges.push(a); }
              else if (/^\d+$/.test(r)) ranges.push([+r-1]);
            });
          }
          if (!ranges.length) { hideProg(); showToast('Invalid range', 'error'); return; }
          for (let i = 0; i < ranges.length; i++) {
            setProg(Math.round((i/ranges.length)*90), `Part ${i+1}/${ranges.length}`);
            const part = await PDFDocument.create();
            (await part.copyPages(src, ranges[i])).forEach(p => part.addPage(p));
            dl(await part.save(), `${e.name.replace(/\.pdf$/i,'')}-part${i+1}.pdf`, 'application/pdf');
            await sleep(60);
          }
          setProg(100,'Done!'); await sleep(350); hideProg();
          showToast(`Split into ${ranges.length} file${ranges.length>1?'s':''}`, 'success');
        } catch(err){ hideProg(); showToast('Split failed: '+err.message,'error'); }
      }); break;

    case 'remove-pages':
      if (!needFile()) return;
      openTool('Remove Pages', '🗑️', `<div class="flex flex-col gap-4">${fileSelHTML('rp-file')}${inputHTML('rp-pages','Pages to remove (e.g. 1, 3, 5-7)','text','1, 3, 5-7')}<p class="text-[11px] text-[#7D756E] dark:text-[#847D76]">Remaining pages saved as a new file.</p></div>`,
      async () => {
        const id = +document.getElementById('rp-file').value;
        const raw = document.getElementById('rp-pages').value;
        const e = files.find(f=>f.id===id); if (!e||!raw.trim()) { showToast('Fill all fields','error'); return; }
        closeTool(); showProg('Removing pages…','Processing');
        try {
          const { PDFDocument } = PDFLib;
          const src = await PDFDocument.load(e.data.slice(),{ignoreEncryption:true});
          const tot = src.getPageCount(); const rm = new Set();
          raw.split(',').forEach(r=>{ r=r.trim(); const m=r.match(/^(\d+)-(\d+)$/); if(m){for(let i=+m[1]-1;i<+m[2];i++)rm.add(i);}else if(/^\d+$/.test(r))rm.add(+r-1); });
          const keep=[...[...Array(tot).keys()]].filter(i=>!rm.has(i));
          if (!keep.length){ hideProg(); showToast('Cannot remove all pages','error'); return; }
          const out = await PDFDocument.create();
          (await out.copyPages(src,keep)).forEach(p=>out.addPage(p));
          setProg(100,'Done!'); await sleep(350); hideProg();
          dl(await out.save(), e.name.replace(/\.pdf$/i,'')+'-edited.pdf','application/pdf');
          showToast(`Removed ${rm.size} page${rm.size>1?'s':''}`, 'success');
        } catch(err){ hideProg(); showToast('Failed: '+err.message,'error'); }
      }); break;

    case 'rotate-all':
      if (!needFile()) return;
      openTool('Rotate All Pages', '🔄', `<div class="flex flex-col gap-4">${fileSelHTML('ra-file')}<div><label class="block text-[12px] font-medium text-[#7D756E] dark:text-[#847D76] mb-2">Rotation</label><div class="grid grid-cols-4 gap-2">${[[90,'↻','90°'],[180,'↕','180°'],[270,'↺','270°'],[-90,'↺','-90°']].map(([v,ic,lbl],i)=>`<label class="flex flex-col items-center gap-1 p-3 rounded-xl border border-[#E2DDD8] dark:border-[#2E2C2A] cursor-pointer hover:border-[#E8521A] transition-colors has-[:checked]:border-[#E8521A] has-[:checked]:bg-[#E8521A]/5"><input type="radio" name="ra-ang" value="${v}" ${i===0?'checked':''} class="sr-only"/><span class="text-xl">${ic}</span><span class="text-[11px] font-mono">${lbl}</span></label>`).join('')}</div></div></div>`,
      async () => {
        const id = +document.getElementById('ra-file').value;
        const ang = +document.querySelector('input[name="ra-ang"]:checked').value;
        const e = files.find(f=>f.id===id); if (!e) return;
        closeTool(); showProg('Rotating…','Processing');
        try {
          const { PDFDocument, degrees } = PDFLib;
          const src = await PDFDocument.load(e.data.slice(),{ignoreEncryption:true});
          src.getPages().forEach(p=>p.setRotation(degrees(p.getRotation().angle+ang)));
          setProg(100,'Done!'); await sleep(350); hideProg();
          dl(await src.save(), e.name.replace(/\.pdf$/i,'')+`-rotated${ang}.pdf`,'application/pdf');
          showToast('Pages rotated','success');
        } catch(err){ hideProg(); showToast('Failed: '+err.message,'error'); }
      }); break;

    case 'compress':
      if (!needFile()) return;
      openTool('Compress PDF', '⚡', `<div class="flex flex-col gap-4">${fileSelHTML('cm-file')}<div class="p-4 bg-[#F5F3EF] dark:bg-[#111010] rounded-xl border border-[#E2DDD8] dark:border-[#2E2C2A] text-[12px] text-[#7D756E] dark:text-[#847D76] leading-relaxed">Re-serialises the PDF using object streams which can reduce file size. For heavy image compression a server-side tool is recommended.</div></div>`,
      async () => {
        const id = +document.getElementById('cm-file').value;
        const e = files.find(f=>f.id===id); if (!e) return;
        closeTool(); showProg('Compressing…','Re-serialising');
        try {
          const { PDFDocument } = PDFLib;
          const src = await PDFDocument.load(e.data.slice(),{ignoreEncryption:true});
          const bytes = await src.save({useObjectStreams:true});
          const ratio = ((1-bytes.length/e.size)*100).toFixed(1);
          setProg(100,'Done!'); await sleep(350); hideProg();
          dl(bytes, e.name.replace(/\.pdf$/i,'')+'-compressed.pdf','application/pdf');
          showToast(ratio>0?`Saved ~${ratio}% file size`:'File re-saved','success');
        } catch(err){ hideProg(); showToast('Failed: '+err.message,'error'); }
      }); break;

    case 'watermark':
      if (!needFile()) return;
      openTool('Add Watermark', '💧', `<div class="flex flex-col gap-4">${fileSelHTML('wm-file')}${inputHTML('wm-text','Watermark text','text','e.g. CONFIDENTIAL','CONFIDENTIAL')}<div class="grid grid-cols-2 gap-3">${inputHTML('wm-opacity','Opacity (0–1)','number','0.15','0.15')}${inputHTML('wm-size','Font size (pt)','number','48','48')}</div></div>`,
      async () => {
        const id  = +document.getElementById('wm-file').value;
        const txt = document.getElementById('wm-text').value || 'WATERMARK';
        const op  = parseFloat(document.getElementById('wm-opacity').value) || 0.15;
        const sz  = parseInt(document.getElementById('wm-size').value) || 48;
        const e   = files.find(f=>f.id===id); if (!e) return;
        closeTool(); showProg('Adding watermark…','Processing pages');
        try {
          const { PDFDocument, rgb, degrees, StandardFonts } = PDFLib;
          const src  = await PDFDocument.load(e.data.slice(),{ignoreEncryption:true});
          const font = await src.embedFont(StandardFonts.HelveticaBold);
          src.getPages().forEach(p => {
            const { width, height } = p.getSize();
            p.drawText(txt, { x: width/2-(font.widthOfTextAtSize(txt,sz)/2), y: height/2, size: sz, font, color: rgb(.5,.5,.5), opacity: op, rotate: degrees(45) });
          });
          setProg(100,'Done!'); await sleep(350); hideProg();
          dl(await src.save(), e.name.replace(/\.pdf$/i,'')+'-watermarked.pdf','application/pdf');
          showToast('Watermark added','success');
        } catch(err){ hideProg(); showToast('Failed: '+err.message,'error'); }
      }); break;

    case 'lock':
      if (!needFile()) return;
      openTool('Lock PDF', '🔒', `<div class="flex flex-col gap-4">${fileSelHTML('lk-file')}${inputHTML('lk-p1','Password','password','Enter password','')}${inputHTML('lk-p2','Confirm password','password','Repeat password','')}<div class="p-3 bg-amber-50 dark:bg-amber-900/20 border border-amber-200 dark:border-amber-700 rounded-xl text-[11px] text-amber-700 dark:text-amber-400">⚠️ pdf-lib does not support AES encryption. This embeds password as keyword metadata. For true encryption use a server-side tool.</div></div>`,
      async () => {
        const p1 = document.getElementById('lk-p1').value;
        const p2 = document.getElementById('lk-p2').value;
        if (!p1) { showToast('Enter a password','error'); return; }
        if (p1 !== p2) { showToast('Passwords do not match','error'); return; }
        const id = +document.getElementById('lk-file').value;
        const e = files.find(f=>f.id===id); if (!e) return;
        closeTool(); showProg('Locking PDF…','Processing');
        try {
          const { PDFDocument } = PDFLib;
          const src = await PDFDocument.load(e.data.slice(),{ignoreEncryption:true});
          src.setKeywords([`locked:${btoa(p1)}`]);
          setProg(100,'Done!'); await sleep(350); hideProg();
          dl(await src.save(), e.name.replace(/\.pdf$/i,'')+'-locked.pdf','application/pdf');
          showToast('PDF locked (metadata)','success');
        } catch(err){ hideProg(); showToast('Failed: '+err.message,'error'); }
      }); break;

    case 'unlock':
      if (!needFile()) return;
      openTool('Unlock PDF', '🔓', `<div class="flex flex-col gap-4">${fileSelHTML('ul-file')}<p class="text-[12px] text-[#7D756E] dark:text-[#847D76] p-3.5 bg-[#F5F3EF] dark:bg-[#111010] border border-[#E2DDD8] dark:border-[#2E2C2A] rounded-xl leading-relaxed">Attempts to re-save the PDF removing copy/print restrictions. Works for owner-password PDFs, not user-password encrypted files.</p></div>`,
      async () => {
        const id = +document.getElementById('ul-file').value;
        const e = files.find(f=>f.id===id); if (!e) return;
        closeTool(); showProg('Unlocking…','Removing restrictions');
        try {
          const { PDFDocument } = PDFLib;
          const src = await PDFDocument.load(e.data.slice(),{ignoreEncryption:true});
          setProg(100,'Done!'); await sleep(350); hideProg();
          dl(await src.save(), e.name.replace(/\.pdf$/i,'')+'-unlocked.pdf','application/pdf');
          showToast('PDF unlocked','success');
        } catch(err){ hideProg(); showToast('Could not unlock: '+err.message,'error'); }
      }); break;
  }
}

// ── localStorage with base64 data ──────────────────────────────────────────
function saveState() {
  try {
    const meta = files.map(f => ({ id:f.id, name:f.name, size:f.size, rotation:f.rotation, data: u8ToB64(f.data) }));
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ meta, out: outputName.value, ne: nameEdited, ts: Date.now() }));
  } catch {
    try {
      const meta = files.map(f => ({ id:f.id, name:f.name, size:f.size, rotation:f.rotation }));
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ meta, out: outputName.value, ne: nameEdited, ts: Date.now(), nd: true }));
    } catch {}
  }
}

function u8ToB64(u8) {
  if (!u8) return null;
  let bin = ''; for (let i = 0; i < u8.byteLength; i++) bin += String.fromCharCode(u8[i]);
  return btoa(bin);
}

function b64ToU8(b64) {
  const bin = atob(b64); const u8 = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) u8[i] = bin.charCodeAt(i);
  return u8;
}

function checkRestore() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY); if (!raw) return;
    const s   = JSON.parse(raw);
    if (Date.now() - s.ts > EXPIRE_MS) { localStorage.removeItem(STORAGE_KEY); return; }
    if (!s.meta?.length) return;

    if (s.out) { outputName.value = s.out; nameEdited = s.ne || false; }

    let restored = 0;
    s.meta.forEach(m => {
      let data = null;
      if (m.data && !s.nd) { try { data = b64ToU8(m.data); } catch {} }
      const entry = { id: m.id, name: m.name, size: m.size, rotation: m.rotation, data, textContent: '' };
      nextId = Math.max(nextId, m.id + 1);
      files.push(entry);
      const card = createCard(entry);
      cardGrid.insertBefore(card, cardGrid.querySelector('.add-card'));
      if (data) { 
        renderThumb(entry, card); restored++; 
        extractPdfText(data).then(t => {
            entry.textContent = t;
            if (typeof performSearch === 'function' && !document.getElementById('searchBar').classList.contains('hidden')) {
                performSearch(document.getElementById('searchInput').value);
            }
        }).catch(e => console.error(e));
      } else { card.querySelector('.card-preview').innerHTML = `<div class="flex flex-col items-center gap-1 text-[#7D756E]"><div class="text-2xl opacity-20">📄</div><span class="text-[10px]">Re-upload</span></div>`; }
    });
    updateUI();
    if (restored === s.meta.length) showToast(`Session restored — ${restored} files`, 'success', 4500);
    else if (restored > 0) showToast(`Partially restored (${restored}/${s.meta.length}) — re-upload missing`, 'info', 5000);
    else showToast(`Restored ${s.meta.length} files — please re-upload`, 'info', 5000);
  } catch {}
}

// ── Helpers ────────────────────────────────────────────────────────────────
function fmtSize(b) { return b<1024?b+' B':b<1048576?(b/1024).toFixed(1)+' KB':(b/1048576).toFixed(1)+' MB'; }
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escRx(s)   { return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }
function sleep(ms)  { return new Promise(r=>setTimeout(r,ms)); }
function dl(bytes, name, mime) {
  const a = Object.assign(document.createElement('a'),{href:URL.createObjectURL(new Blob([bytes],{type:mime})),download:name});
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(a.href),8000);
}

// ── Search & Highlight ─────────────────────────────────────────────────────
const searchBar = document.getElementById('searchBar');
const searchInput = document.getElementById('searchInput');
const searchCount = document.getElementById('searchCount');
const closeSearch = document.getElementById('closeSearch');

function clearSearch() {
  searchInput.value = '';
  searchCount.textContent = '';
  cardGrid.querySelectorAll('.pdf-card').forEach(card => {
    card.style.opacity = '1';
    card.style.boxShadow = '';
    const id = +card.dataset.id;
    const entry = files.find(f => f.id === id);
    if (entry) {
        card.querySelector('.card-name').innerHTML = escHtml(entry.name);
    }
    const badge = card.querySelector('.content-match-badge');
    if (badge) badge.remove();
  });
}

function performSearch(query) {
  query = query.toLowerCase().trim();
  let matchCount = 0;
  if (!query) { clearSearch(); return; }
  
  cardGrid.querySelectorAll('.pdf-card').forEach(card => {
    const id = +card.dataset.id;
    const entry = files.find(f => f.id === id);
    if (!entry) return;
    
    const nameMatch = entry.name.toLowerCase().includes(query);
    const contentMatch = entry.textContent && entry.textContent.includes(query);
    const nameEl = card.querySelector('.card-name');
    
    if (nameMatch || contentMatch) {
      matchCount++;
      card.style.opacity = '1';
      card.style.boxShadow = '0 0 0 2px #E8521A, 0 4px 12px rgba(232,82,26,0.2)';
      card.classList.add('z-10'); // Bring ahead of opaque neighbors
      
      if (nameMatch) {
        const regex = new RegExp(`(${escRx(query)})`, 'gi');
        nameEl.innerHTML = escHtml(entry.name).replace(regex, '<mark class="bg-[#E8521A] text-white px-0.5 rounded">$1</mark>');
      } else {
        nameEl.innerHTML = escHtml(entry.name);
      }
      
      let badge = card.querySelector('.content-match-badge');
      if (contentMatch) {
        if (!badge) {
          badge = document.createElement('div');
          badge.className = 'content-match-badge absolute bottom-2 left-2 bg-[#1A56E8] text-white text-[9px] px-1.5 py-0.5 rounded font-medium z-10 shadow-sm';
          badge.textContent = 'Content Match';
          card.querySelector('.card-preview').appendChild(badge);
        }
      } else {
        if (badge) badge.remove();
      }
    } else {
      card.style.opacity = '0.25';
      card.style.boxShadow = 'none';
      card.classList.remove('z-10');
      nameEl.innerHTML = escHtml(entry.name);
      const badge = card.querySelector('.content-match-badge');
      if (badge) badge.remove();
    }
  });
  
  searchCount.textContent = `${matchCount} match${matchCount !== 1 ? 'es' : ''}`;
}

document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'f') {
    if (!document.getElementById('mergeResult').classList.contains('hidden')) return; // skip if merge result open
    e.preventDefault();
    searchBar.classList.remove('hidden');
    searchInput.focus();
    performSearch(searchInput.value);
  }
  if (e.key === 'Escape') {
    if (!searchBar.classList.contains('hidden')) {
      searchBar.classList.add('hidden');
      clearSearch();
    }
  }
});

searchInput.addEventListener('input', e => {
  performSearch(e.target.value);
});

closeSearch.addEventListener('click', () => {
  searchBar.classList.add('hidden');
  clearSearch();
});

// ── Init ───────────────────────────────────────────────────────────────────
appendAddCard();
checkRestore();
</script>
</body>
</html>
